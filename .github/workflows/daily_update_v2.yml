name: RIPPLEPOINT Daily Auto-Update

on:
  schedule:
    - cron: '0 3 * * 1-5'    # 8:30am IST = 03:00 UTC  — weekdays
    - cron: '30 11 * * 1-5'  # 5:00pm IST = 11:30 UTC  — weekdays
  workflow_dispatch:           # manual trigger anytime from Actions tab

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests pandas numpy

      - name: Run RIPPLEPOINT data update
        run: python update_data.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "RIPPLEPOINT Bot"
          git config user.email "bot@rippleaxis.com"
          git add dashboard_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: data update $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi

      - name: Log completion
        run: |
          echo "Update complete: $(date -u)"
          echo "Dashboard will reflect new data within 2 minutes at ripplepoint.rippleaxispoint.com"
